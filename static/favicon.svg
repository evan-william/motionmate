<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#36d4ef"/>
      <stop offset="100%" stop-color="#0d7a90"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18B8D6"/>
      <stop offset="100%" stop-color="#0a5c6e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#g2)"/>
  <!-- Subtle inner glow border -->
  <rect width="32" height="32" rx="8" fill="none" stroke="rgba(54,212,239,0.3)" stroke-width="1"/>
  <!-- M letterform — clean geometric -->
  <path d="M6 23V9l10 9 10-9v14" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Accent dot at bottom center -->
  <circle cx="16" cy="25.5" r="1.8" fill="#36d4ef" opacity="0.9"/>
</svg>
