<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MotionMate{% endblock %} — AI Rehabilitation</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/favicon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.svg') }}">
  <meta name="theme-color" content="#18B8D6">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#F4FAFD; --bg-2:#FFFFFF; --bg-3:#E4F2F8; --bg-card:#FFFFFF;
      --border:rgba(11,155,188,0.16); --border-accent:rgba(11,155,188,0.40);
      --blue:#0B9BBC; --blue-dim:rgba(11,155,188,0.09); --blue-glow:rgba(11,155,188,0.18);
      --blue-bright:#17C5E0; --blue-dark:#087A95;
      --white:#081C2B; --text-muted:#4A789A; --text-sub:#1A506A;
      --danger:#d9001e; --warning:#b45309; --success:#15803d;
      --radius:10px; --radius-lg:16px; --radius-xl:24px;
      --font-body:'Outfit',sans-serif; --font-mono:'JetBrains Mono',monospace;
      --nav-h:68px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--white);font-family:var(--font-body);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  </style>
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
