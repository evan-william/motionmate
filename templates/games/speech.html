<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Terapi Wicara , MotionMate</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/favicon.png') }}">
  <meta name="theme-color" content="#18B8D6">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#F4FAFD; --bg-card:#FFFFFF; --border:rgba(11,155,188,0.16); --border-accent:rgba(11,155,188,0.40); --blue:#0B9BBC; --blue-dim:rgba(11,155,188,0.09); --blue-bright:#17C5E0; --white:#081C2B; --text-muted:#4A789A; --font-body:'Outfit',sans-serif; --font-mono:'JetBrains Mono',monospace; --nav-h:64px; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0} html{font-size:16px} body{background:var(--bg);color:var(--white);font-family:var(--font-body);min-height:100vh}
    .page{padding-top:calc(var(--nav-h) + 2rem);padding-bottom:4rem;display:flex;justify-content:center}
    .game-container{background:var(--bg-card);border:2px solid var(--border-accent);border-radius:24px;padding:2rem;max-width:600px;width:100%;box-shadow:0 12px 40px rgba(11,155,188,0.1);text-align:center}
    .title{font-size:2rem;font-weight:800;color:var(--blue);margin-bottom:5px}
    .controls{display:flex;gap:10px;margin:2rem 0;justify-content:center}
    select, button{padding:10px 15px;font-family:var(--font-body);font-size:14px;font-weight:700;border-radius:8px;border:1px solid var(--border-accent);outline:none}
    button{background:var(--blue);color:#fff;cursor:pointer;border:none}
    button:hover{background:var(--blue-bright)}
    button:disabled{opacity:0.5;cursor:not-allowed}
    .mic-btn{width:80px;height:80px;border-radius:50%;font-size:30px;display:inline-flex;align-items:center;justify-content:center;margin:1rem auto;transition:all 0.3s;box-shadow:0 8px 20px rgba(11,155,188,0.2)}
    .mic-btn.listening{background:#ef4444;box-shadow:0 0 30px #ef4444;animation:pulse 1.5s infinite}
    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    .target-box{background:var(--bg);border:2px dashed var(--border);border-radius:12px;padding:1.5rem;font-size:1.4rem;font-weight:700;margin-bottom:1rem;color:var(--white)}
    .speech-box{background:#f8fafc;border:1px solid #cbd5e1;border-radius:12px;padding:1.5rem;font-size:1.2rem;min-height:80px;color:#334155;margin-bottom:1.5rem;font-style:italic}
    .info-bar{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:14px;color:var(--text-muted);font-weight:700;padding:10px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
    .word-correct{color:#16a34a;font-weight:800} .word-wrong{color:#ef4444;text-decoration:line-through}
  </style>
</head>
<body>
  {% include 'partials/nav.html' %}
  <div class="page">
    <div class="game-container">
      <div class="title">Terapi Wicara</div>
      <p style="font-size:13px;color:var(--text-muted)">Bacakan kalimat di bawah ini dengan jelas.</p>
      
      <div class="controls">
        <select id="diffSelect">
          <option value="easy">Pendek</option>
          <option value="medium">Sedang</option>
          <option value="hard">Panjang</option>
        </select>
        <button id="startBtn" onclick="startGame()">Mulai Sesi</button>
      </div>

      <div class="info-bar">
        <span>Kalimat: <span id="roundDisp">0 / 10</span></span>
        <span>Akurasi: <span id="accDisp">0%</span></span>
      </div>

      <div class="target-box" id="targetText">Klik Mulai untuk membaca.</div>
      <button class="mic-btn" id="micBtn" disabled>🎤</button>
      <div class="speech-box" id="speechText">Hasil suara akan muncul di sini...</div>
      <button id="nextBtn" onclick="nextRound()" style="display:none;width:100%">Lanjut Kalimat Berikutnya &rarr;</button>
    </div>
  </div>

  <script>
    const sentences = {
      easy: ["Saya mau makan", "Hari ini cerah", "Budi pergi ke pasar", "Satu dua tiga", "Tolong bantu saya"],
      medium: ["Kucing itu tidur di atas meja yang hangat", "Saya ingin minum segelas air putih", "Tolong ambilkan buku di atas lemari", "Besok pagi kita akan pergi jalan jalan", "Terima kasih atas bantuan Anda hari ini"],
      hard: ["Pembangunan infrastruktur sangat penting untuk memajukan perekonomian bangsa kita", "Rehabilitasi medis membutuhkan kesabaran dan konsistensi setiap harinya", "Keberhasilan tidak datang secara instan melainkan melalui proses yang panjang", "Menjaga kesehatan tubuh sama pentingnya dengan menjaga kesehatan pikiran", "Teknologi kecerdasan buatan dapat membantu mempercepat proses pemulihan pasien"]
    };

    let round = 0;
    let totalScore = 0;
    let currentTarget = "";
    let recognition = null;
    const MAX_ROUNDS = 10;

    const startBtn = document.getElementById('startBtn');
    const diffSelect = document.getElementById('diffSelect');
    const targetText = document.getElementById('targetText');
    const speechText = document.getElementById('speechText');
    const micBtn = document.getElementById('micBtn');
    const nextBtn = document.getElementById('nextBtn');

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechReg = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechReg();
      recognition.lang = 'id-ID';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        micBtn.classList.add('listening');
        speechText.textContent = "Mendengarkan...";
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        processResult(transcript);
      };

      recognition.onerror = (e) => {
        micBtn.classList.remove('listening');
        speechText.textContent = "Error: " + e.error;
      };

      recognition.onend = () => {
        micBtn.classList.remove('listening');
      };
    } else {
      targetText.textContent = "Browser tidak mendukung fitur suara.";
    }

    micBtn.onclick = () => {
      if(recognition) recognition.start();
    };

    function startGame() {
      startBtn.disabled = true;
      diffSelect.disabled = true;
      micBtn.disabled = false;
      round = 0; totalScore = 0;
      document.getElementById('accDisp').textContent = "0%";
      nextRound();
    }

    function nextRound() {
      if (round >= MAX_ROUNDS) {
        endGame();
        return;
      }
      round++;
      document.getElementById('roundDisp').textContent = `${round} / ${MAX_ROUNDS}`;
      
      const list = sentences[diffSelect.value];
      currentTarget = list[Math.floor(Math.random() * list.length)];
      targetText.textContent = currentTarget;
      speechText.textContent = "Tekan tombol mic untuk bicara.";
      speechText.innerHTML = "";
      nextBtn.style.display = "none";
      micBtn.style.display = "inline-flex";
    }

    function processResult(spoken) {
      micBtn.style.display = "none";
      const targetWords = currentTarget.toLowerCase().replace(/[.,]/g,'').split(' ');
      const spokenWords = spoken.toLowerCase().replace(/[.,]/g,'').split(' ');
      
      let matchCount = 0;
      let htmlOut = [];
      
      targetWords.forEach(word => {
        if(spokenWords.includes(word)) {
          matchCount++;
          htmlOut.push(`<span class="word-correct">${word}</span>`);
        } else {
          htmlOut.push(`<span class="word-wrong">${word}</span>`);
        }
      });
      
      speechText.innerHTML = `Kamu bilang: "${spoken}"<br><br>Hasil: ` + htmlOut.join(' ');
      
      let acc = (matchCount / targetWords.length) * 100;
      totalScore += acc;
      
      document.getElementById('accDisp').textContent = Math.round(totalScore/round) + "%";
      nextBtn.style.display = "block";
    }

    async function endGame() {
      targetText.textContent = "Sesi Selesai!";
      let finalAcc = Math.round(totalScore / MAX_ROUNDS);
      speechText.innerHTML = `Akurasi rata-rata Anda: <strong>${finalAcc}%</strong>`;
      micBtn.style.display = "none";
      nextBtn.style.display = "none";
      
      try {
        await fetch('{{ url_for("games.save") }}', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            game_type: 'speech',
            difficulty: diffSelect.value,
            accuracy: finalAcc
          })
        });
      } catch(e) { console.log("Save error"); }

      startBtn.disabled = false;
      diffSelect.disabled = false;
      startBtn.textContent = 'Main Lagi';
    }
  </script>
</body>
</html>
